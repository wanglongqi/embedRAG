node:
  role: writer
  node_id: classics-writer
  data_dir: /tmp/embedrag-classics

embedding:
  service_url: http://127.0.0.1:1234/v1/embeddings
  api_format: openai
  model: text-embedding-qwen3-embedding-0.6b
  batch_size: 32
  timeout_seconds: 120
  retry_count: 3

index_build:
  num_shards: 2
  ivf_nlist: 128
  pq_m: 64
  train_sample_size: 500000
  compression: zstd
  compression_level: 3

server:
  host: 0.0.0.0
  port: 8001
  workers: 1

logging:
  level: INFO
  format: console
