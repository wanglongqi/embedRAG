node:
  role: writer
  node_id: lunyu-quotes-writer
  data_dir: /tmp/embedrag-lunyu-quotes

db:
  wal_autocheckpoint: 500
  cache_size_mb: 32

embedding:
  service_url: http://127.0.0.1:1234/v1/embeddings
  api_format: openai
  model: text-embedding-mxbai-embed-large-v1
  batch_size: 64
  timeout_seconds: 60
  retry_count: 3

index_build:
  num_shards: 1
  ivf_nlist: 256
  pq_m: 32
  compression: zstd
  compression_level: 3

server:
  host: 0.0.0.0
  port: 8001
  workers: 1

logging:
  level: INFO
  format: console
