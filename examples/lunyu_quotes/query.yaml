node:
  role: query
  node_id: lunyu-quotes-query
  data_dir: examples/lunyu_quotes/snapshot

embedding:
  service_url: http://127.0.0.1:1234/v1/embeddings
  api_format: openai
  model: text-embedding-mxbai-embed-large-v1
  batch_size: 32
  timeout_seconds: 60
  retry_count: 3

index:
  num_shards: 1
  nprobe: 16
  mmap: true

search:
  default_top_k: 10
  max_top_k: 50
  enable_sparse: true
  enable_hierarchy_expand: false
  context_depth: 0

hotfix:
  enabled: true
  max_vectors: 500

server:
  host: 0.0.0.0
  port: 8000
  workers: 1

logging:
  level: INFO
  format: console
