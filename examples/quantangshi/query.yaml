node:
  role: query
  node_id: qts-query
  data_dir: examples/quantangshi/snapshot

embedding:
  service_url: http://127.0.0.1:1234/v1/embeddings
  api_format: openai
  model: text-embedding-qwen3-embedding-0.6b
  batch_size: 32
  timeout_seconds: 60
  retry_count: 3

index:
  num_shards: 4
  nprobe: 32
  mmap: true

search:
  default_top_k: 10
  max_top_k: 50
  enable_sparse: true
  enable_hierarchy_expand: false
  context_depth: 0

hotfix:
  enabled: true
  max_vectors: 1000

server:
  host: 0.0.0.0
  port: 8000
  workers: 1

logging:
  level: INFO
  format: console
