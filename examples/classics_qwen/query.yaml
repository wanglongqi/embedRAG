node:
  role: query
  node_id: classics-qwen-query
  data_dir: examples/classics_qwen/snapshot

embedding:
  service_url: http://127.0.0.1:1234/v1/embeddings
  api_format: openai
  model: text-embedding-qwen3-vl-embedding-2b
  batch_size: 16
  timeout_seconds: 60
  retry_count: 3

index:
  num_shards: 1
  nprobe: 16
  mmap: true

search:
  default_top_k: 10
  max_top_k: 50
  enable_sparse: true
  enable_hierarchy_expand: true
  context_depth: 1

hotfix:
  enabled: true
  max_vectors: 1000

llm:
  service_url: http://127.0.0.1:1234/v1/chat/completions
  model: qwen/qwen3-vl-4b
  language: Chinese

server:
  host: 0.0.0.0
  port: 8000
  workers: 1

sync:
  enabled: false

logging:
  level: INFO
  format: console
