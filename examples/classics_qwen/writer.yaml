node:
  role: writer
  node_id: classics-qwen-writer
  data_dir: /tmp/embedrag-classics-qwen

embedding:
  service_url: http://127.0.0.1:1234/v1/embeddings
  api_format: openai
  model: text-embedding-qwen3-vl-embedding-2b
  batch_size: 16
  timeout_seconds: 120
  retry_count: 3

index_build:
  num_shards: 1
  ivf_nlist: 64
  pq_m: 32
  train_sample_size: 100000
  compression: zstd
  compression_level: 3

server:
  host: 0.0.0.0
  port: 8002
  workers: 1

logging:
  level: INFO
  format: console
